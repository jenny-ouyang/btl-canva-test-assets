<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--accent:#6B2FD0;--secondary:#8B5CF6;--lav:#F0EBFF;--lav2:#E9DBFF;--canvas:#F9F9F5;--card:#FFFFFF;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--sep:#E5E7EB;--dot:#D9CCF5;--tex:#E7DEFA;
    --elev:0 0 0 1px #ECE7F5, 0 26px 50px -16px rgba(107,47,208,.22);}
  *{box-sizing:border-box;margin:0;}
  body{font-family:'Nunito',sans-serif;}
  .page{position:relative;background:var(--canvas);overflow:hidden;}
  .tex{position:absolute;inset:0;background-image:radial-gradient(var(--tex) 2.5px,transparent 2.6px);background-size:46px 46px;opacity:.5;z-index:0;}
  .eyebrow{display:flex;align-items:center;gap:14px;font-size:30px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
  .edot{width:18px;height:18px;border-radius:50%;background:var(--accent);display:inline-block;}
  .hl{background:var(--lav2);color:var(--accent);border-radius:12px;padding:2px 14px;white-space:nowrap;-webkit-box-decoration-break:clone;box-decoration-break:clone;}
  .ft{position:absolute;bottom:54px;font-family:'Barlow Semi Condensed',sans-serif;font-size:28px;font-weight:600;color:#9CA3AF;z-index:2;}
</style></head><body>
<style>
  .qz{width:1080px;height:1080px;background:var(--ink);}
  .qz .glow{position:absolute;width:680px;height:680px;border-radius:50%;background:rgba(139,92,246,.30);right:-220px;top:-240px;filter:blur(10px);z-index:0;}
  .qz .content{position:absolute;inset:0;padding:100px 96px;display:flex;flex-direction:column;z-index:1;}
  .qz .eyebrow{color:#C9B6F5;} .qz .edot{background:#C9B6F5;}
  .qz .mark{font-size:300px;font-weight:900;color:rgba(201,182,245,.30);line-height:.55;margin:24px 0 -40px;}
  .qz .q{margin-top:auto;font-size:92px;font-weight:900;color:#F8F6FF;line-height:1.12;}
  .qz .q .hl{background:var(--accent);color:#fff;border-radius:14px;padding:2px 18px;}
  .qz .author{display:flex;align-items:center;gap:22px;margin-top:46px;margin-bottom:auto;}
  .qz .av{width:78px;height:78px;border-radius:50%;background:var(--accent);color:#fff;font-size:34px;font-weight:900;display:flex;align-items:center;justify-content:center;}
  .qz .aname{font-family:'Barlow Semi Condensed',sans-serif;font-size:40px;font-weight:600;color:#F8F6FF;}
  .qz .ah{font-family:'Barlow Semi Condensed',sans-serif;font-size:30px;color:#A7A2B3;}
  .qz .ft{left:96px;color:#8C8697;}
</style>
<div class="page qz" data-document-role="page" data-label="Quote">
  <div class="glow"></div>
  <div class="content">
    <div class="eyebrow"><span class="edot"></span>Build to Launch</div>
    <div class="mark">&ldquo;</div>
    <div class="q">Most people overbuild the framework and never <span class="hl">ship the tool</span>.</div>
    <div class="author"><span class="av">JO</span><div><div class="aname">Jenny Ouyang</div><div class="ah">buildtolaunch.substack.com</div></div></div>
  </div>
</div></body></html>
