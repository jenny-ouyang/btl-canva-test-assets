<!DOCTYPE html>
<!-- btl-canva-kit surface · kraft paper (1080×1350). Real surface IMAGE + handwritten ink text. -->
<html lang="en"><head><meta charset="utf-8"><title>Kraft</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1350px;overflow:hidden;background:#C8A876;}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
.wrap{position:relative;z-index:2;padding:108px 96px;color:#3B2C1A;}
.eyebrow{font-family:'Kalam',cursive;font-weight:700;font-size:40px;letter-spacing:2px;color:#6B4E2E;}
.title{font-family:'Caveat',cursive;font-weight:700;font-size:128px;line-height:1.0;margin:6px 0 40px;color:#2E2114;}
.lead{font-family:'Kalam',cursive;font-weight:700;font-size:50px;margin-bottom:18px;color:#3B2C1A;}
.line{font-family:'Kalam',cursive;font-size:54px;line-height:1.55;color:#3B2C1A;}
.tick{color:#6B2FD0;font-weight:700;}
.ft{position:absolute;left:96px;bottom:72px;z-index:2;font-family:'Kalam',cursive;font-size:34px;color:#6B4E2E;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Kraft">
  <img class="bg" src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/surfaces/surface_kraft.png" alt="kraft paper">
  <div class="wrap">
    <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
    <div class="title">Friday build notes</div>
    <div class="lead">what shipped this week:</div>
    <div class="line"><span class="tick">✓</span> canva kit — 20 templates</div>
    <div class="line"><span class="tick">✓</span> elements library</div>
    <div class="line"><span class="tick">✓</span> surfaces + handwriting</div>
  </div>
  <div class="ft">buildtolaunch.substack.com</div>
</div>
</body></html>
