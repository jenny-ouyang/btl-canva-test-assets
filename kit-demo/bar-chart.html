<!DOCTYPE html>
<!-- btl-canva-kit TEMPLATE · bar chart (1080×1080) — div bars (proven). Bars align on a baseline; labels below.
     Swap zones: 1) BRAND TOKENS  2) CONTENT (title/sub + REPEAT:bar). Bar height px = value% of 460. -->
<html lang="en"><head><meta charset="utf-8"><title>Bar chart</title>
<!-- SWAP(fonts) -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* >>> BRAND TOKENS >>> */
:root{--accent:#6B2FD0;--secondary:#8B5CF6;--third:#C4A9F2;--canvas:#F9F9F5;--card:#FFFFFF;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--lav:#F0EBFF;--lav2:#E9DBFF;--sep:#E5E7EB;--tex:#E7DEFA;--headerFont:'Nunito';--bodyFont:'Barlow Semi Condensed';}
/* <<< END BRAND TOKENS <<< */
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1080px;background:var(--canvas);overflow:hidden;padding:70px;font-family:var(--headerFont),sans-serif;}
.tex{position:absolute;inset:0;background-image:radial-gradient(var(--tex) 2.5px,transparent 2.6px);background-size:46px 46px;opacity:.45;z-index:0;}
.eyebrow{position:relative;z-index:1;font-size:26px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.title{position:relative;z-index:1;font-size:60px;font-weight:900;color:var(--ink);line-height:1.04;margin:8px 0 6px;}
.sub{position:relative;z-index:1;font-family:var(--bodyFont),sans-serif;font-size:30px;color:var(--muted);margin-bottom:20px;}
.chart{position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:center;gap:54px;height:540px;border-bottom:4px solid var(--sep);padding:0 30px;margin-top:30px;}
.bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;}
.bval{font-size:38px;font-weight:800;color:var(--accent);margin-bottom:12px;}
.bar{width:128px;border-radius:14px 14px 0 0;background:linear-gradient(180deg,#8B5CF6,#6B2FD0);box-shadow:0 -2px 0 rgba(0,0,0,.04);}
.blabels{position:relative;z-index:1;display:flex;justify-content:center;gap:54px;padding:0 30px;margin-top:18px;}
.blabel{width:128px;text-align:center;font-family:var(--bodyFont),sans-serif;font-weight:600;color:var(--body);font-size:28px;}
.ft{position:absolute;left:70px;bottom:46px;font-family:var(--bodyFont),sans-serif;font-size:26px;font-weight:600;color:#9CA3AF;z-index:2;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Bar chart">
  <div class="tex"></div>
  <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
  <!-- SWAP(title/sub) -->
  <div class="title">Time saved per task</div>
  <div class="sub">With an AI workflow vs by hand</div>
  <!-- >>> REPEAT:bar — one .bar-col per metric; bar height px = value% × 4.6 (e.g. 70% → 322px). Keep a matching .blabel below in the same order. >>> -->
  <div class="chart">
    <div class="bar-col"><div class="bval">80%</div><div class="bar" style="height:368px"></div></div>
    <div class="bar-col"><div class="bval">70%</div><div class="bar" style="height:322px"></div></div>
    <div class="bar-col"><div class="bval">55%</div><div class="bar" style="height:253px"></div></div>
    <div class="bar-col"><div class="bval">40%</div><div class="bar" style="height:184px"></div></div>
  </div>
  <div class="blabels">
    <div class="blabel">Email</div><div class="blabel">Research</div><div class="blabel">Drafting</div><div class="blabel">Refactor</div>
  </div>
  <!-- <<< /REPEAT:bar -->
  <div class="ft">Build to Launch · buildtolaunch.substack.com</div>
</div>
</body></html>
