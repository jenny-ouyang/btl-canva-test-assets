<!DOCTYPE html>
<!-- Verify sheet: all 18 elements from elements.json rendered in a grid to confirm SVG survives import. -->
<html lang="en"><head><meta charset="utf-8"><title>Elements sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--accent:#6B2FD0;--canvas:#F9F9F5;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--tex:#E7DEFA;--sep:#E5E7EB;}
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1350px;background:var(--canvas);overflow:hidden;padding:64px;font-family:'Nunito',sans-serif;}
.tex{position:absolute;inset:0;background-image:radial-gradient(var(--tex) 2.5px,transparent 2.6px);background-size:46px 46px;opacity:.4;z-index:0;}
.eyebrow{position:relative;z-index:1;font-size:26px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.title{position:relative;z-index:1;font-size:58px;font-weight:900;color:var(--ink);margin:8px 0 28px;}
.grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.cell{background:#fff;border-radius:16px;box-shadow:0 0 0 1px #ECE7F5;padding:16px;height:206px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.icon{height:104px;display:flex;align-items:center;justify-content:center;}
.icon svg{max-width:160px;max-height:104px;height:auto;width:auto;}
.lbl{font-family:'Barlow Semi Condensed',sans-serif;font-size:23px;font-weight:600;color:var(--body);text-align:center;}
.ft{position:absolute;left:64px;bottom:40px;font-family:'Barlow Semi Condensed',sans-serif;font-size:24px;font-weight:600;color:#9CA3AF;z-index:2;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Elements sheet">
  <div class="tex"></div>
  <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
  <div class="title">Elements library</div>
  <div class="grid">

    <div class="cell"><div class="icon"><svg viewBox='0 0 120 80'><path d='M10 68 Q58 6 100 44' fill='none' stroke='#6B2FD0' stroke-width='5' stroke-linecap='round'/><path d='M90 32 L110 44 L94 60 Z' fill='#6B2FD0'/></svg></div><div class="lbl">Curved arrow</div></div>

    <div class="cell"><div class="icon"><svg viewBox='0 0 80 80'><circle cx='40' cy='40' r='36' fill='#6B2FD0'/><path d='M24 41 L36 53 L57 28' fill='none' stroke='#ffffff' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/></svg></div><div class="lbl">Check circle</div></div>
  </div>
  <div class="ft">Build to Launch · buildtolaunch.substack.com</div>
</div>
</body></html>
