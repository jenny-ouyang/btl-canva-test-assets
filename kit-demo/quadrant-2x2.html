<!DOCTYPE html>
<!-- btl-canva-kit TEMPLATE · 2×2 quadrant (1080×1080) — CSS grid (proven). Axis labels horizontal (no rotated text).
     Swap zones: 1) BRAND TOKENS  2) CONTENT (title/sub, axis labels, 4 quadrant cards). -->
<html lang="en"><head><meta charset="utf-8"><title>Quadrant</title>
<!-- SWAP(fonts) -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* >>> BRAND TOKENS >>> */
:root{--accent:#6B2FD0;--secondary:#8B5CF6;--third:#C4A9F2;--canvas:#F9F9F5;--card:#FFFFFF;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--lav:#F0EBFF;--lav2:#E9DBFF;--sep:#E5E7EB;--tex:#E7DEFA;--headerFont:'Nunito';--bodyFont:'Barlow Semi Condensed';}
/* <<< END BRAND TOKENS <<< */
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1080px;background:var(--canvas);overflow:hidden;padding:70px;font-family:var(--headerFont),sans-serif;}
.tex{position:absolute;inset:0;background-image:radial-gradient(var(--tex) 2.5px,transparent 2.6px);background-size:46px 46px;opacity:.45;z-index:0;}
.eyebrow{position:relative;z-index:1;font-size:26px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.title{position:relative;z-index:1;font-size:60px;font-weight:900;color:var(--ink);line-height:1.04;margin:8px 0 6px;}
.sub{position:relative;z-index:1;font-family:var(--bodyFont),sans-serif;font-size:30px;color:var(--muted);margin-bottom:14px;}
.axtop{position:relative;z-index:1;text-align:center;font-family:var(--bodyFont),sans-serif;font-weight:700;color:var(--muted);font-size:28px;margin-bottom:8px;}
.axbot{position:relative;z-index:1;text-align:center;font-family:var(--bodyFont),sans-serif;font-weight:700;color:var(--muted);font-size:28px;margin-top:8px;}
.grid2{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:18px;width:840px;height:680px;margin:0 auto;}
.qcard{background:#fff;border-radius:20px;box-shadow:0 0 0 1px #ECE7F5,0 18px 36px -16px rgba(107,47,208,.2);padding:32px;display:flex;flex-direction:column;}
.qcard.best{background:var(--lav2);box-shadow:0 0 0 2px var(--accent),0 18px 36px -16px rgba(107,47,208,.3);}
.qhead{font-size:36px;font-weight:800;color:var(--ink);margin-bottom:16px;line-height:1.1;}
.chip{display:inline-block;background:var(--lav);color:var(--accent);font-family:var(--bodyFont),sans-serif;font-weight:600;font-size:26px;padding:7px 18px;border-radius:999px;margin:4px 6px 0 0;}
.ft{position:absolute;left:70px;bottom:46px;font-family:var(--bodyFont),sans-serif;font-size:26px;font-weight:600;color:#9CA3AF;z-index:2;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Quadrant">
  <div class="tex"></div>
  <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
  <!-- SWAP(title/sub + axis labels) -->
  <div class="title">Which AI tool, when</div>
  <div class="sub">By effort and power</div>
  <div class="axtop">↑ more powerful</div>
  <!-- SWAP(quadrants): 4 cards. Top row = high power; right column = high effort. Tint the hero with class "best". -->
  <div class="grid2">
    <div class="qcard"><div class="qhead">Automate the routine</div><div><span class="chip">Skills</span><span class="chip">Routines</span></div></div>
    <div class="qcard best"><div class="qhead">Build real systems</div><div><span class="chip">MCP</span><span class="chip">Agents</span></div></div>
    <div class="qcard"><div class="qhead">Quick answers</div><div><span class="chip">ChatGPT</span><span class="chip">Claude chat</span></div></div>
    <div class="qcard"><div class="qhead">Hands-on building</div><div><span class="chip">Claude Code</span><span class="chip">Cursor</span></div></div>
  </div>
  <div class="axbot">more effort →</div>
  <div class="ft">Build to Launch · buildtolaunch.substack.com</div>
</div>
</body></html>
