<!DOCTYPE html>
<!-- btl-canva-kit TEMPLATE · flowchart (1080×1080) — SVG <line>+<marker> arrows (proven to survive import).
     Swap zones: 1) BRAND TOKENS  2) CONTENT (title/sub, node text, yes/no labels). -->
<html lang="en"><head><meta charset="utf-8"><title>Flowchart</title>
<!-- SWAP(fonts) -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* >>> BRAND TOKENS >>> */
:root{--accent:#6B2FD0;--secondary:#8B5CF6;--third:#C4A9F2;--canvas:#F9F9F5;--card:#FFFFFF;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--lav:#F0EBFF;--lav2:#E9DBFF;--sep:#E5E7EB;--tex:#E7DEFA;--headerFont:'Nunito';--bodyFont:'Barlow Semi Condensed';}
/* <<< END BRAND TOKENS <<< */
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1080px;background:var(--canvas);overflow:hidden;padding:70px;font-family:var(--headerFont),sans-serif;}
.tex{position:absolute;inset:0;background-image:radial-gradient(var(--tex) 2.5px,transparent 2.6px);background-size:46px 46px;opacity:.45;z-index:0;}
.eyebrow{position:relative;z-index:1;font-size:26px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.title{position:relative;z-index:1;font-size:60px;font-weight:900;color:var(--ink);line-height:1.04;margin:8px 0 6px;}
.sub{position:relative;z-index:1;font-family:var(--bodyFont),sans-serif;font-size:30px;color:var(--muted);margin-bottom:10px;}
.flowwrap{position:relative;z-index:1;width:912px;height:660px;margin-top:18px;}
.node{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-radius:18px;padding:16px 22px;}
.n-plain{background:#fff;color:var(--ink);box-shadow:0 0 0 1px #ECE7F5,0 14px 30px -12px rgba(107,47,208,.22);font-size:30px;font-weight:800;line-height:1.15;}
.n-acc{background:var(--accent);color:#fff;box-shadow:0 14px 30px -12px rgba(107,47,208,.4);}
.n-sec{background:var(--secondary);color:#fff;box-shadow:0 14px 30px -12px rgba(139,92,246,.4);}
.nlead{font-size:40px;font-weight:900;line-height:1;}
.nsub{font-family:var(--bodyFont),sans-serif;font-size:24px;font-weight:600;opacity:.92;margin-top:10px;line-height:1.25;}
.elbl{position:absolute;font-family:var(--bodyFont),sans-serif;font-size:27px;font-weight:700;color:var(--muted);z-index:2;}
.ft{position:absolute;left:70px;bottom:46px;font-family:var(--bodyFont),sans-serif;font-size:26px;font-weight:600;color:#9CA3AF;z-index:2;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Flowchart">
  <div class="tex"></div>
  <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
  <!-- SWAP(title/sub) -->
  <div class="title">Skill or MCP?</div>
  <div class="sub">A 10-second decision</div>
  <div class="flowwrap">
    <!-- SWAP(arrows): keep the marker; move line endpoints if you re-layout nodes -->
    <svg width="912" height="660" viewBox="0 0 912 660" style="position:absolute;inset:0;">
      <defs><marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#6B2FD0"/></marker></defs>
      <line x1="456" y1="112" x2="456" y2="182" stroke="#6B2FD0" stroke-width="4" marker-end="url(#ah)"/>
      <line x1="425" y1="300" x2="252" y2="412" stroke="#6B2FD0" stroke-width="4" marker-end="url(#ah)"/>
      <line x1="487" y1="300" x2="660" y2="412" stroke="#6B2FD0" stroke-width="4" marker-end="url(#ah)"/>
    </svg>
    <!-- SWAP(nodes) -->
    <div class="node n-plain" style="left:276px;top:14px;width:360px;height:94px;">Adding a capability to Claude</div>
    <div class="node n-plain" style="left:276px;top:190px;width:360px;height:110px;">Reused across many projects?</div>
    <div class="node n-acc" style="left:74px;top:418px;width:312px;height:140px;"><div class="nlead">SKILL</div><div class="nsub">lives in your repo<br>zero infra</div></div>
    <div class="node n-sec" style="left:526px;top:418px;width:312px;height:140px;"><div class="nlead">MCP</div><div class="nsub">a shared service<br>external API</div></div>
    <div class="elbl" style="left:300px;top:356px;">no</div>
    <div class="elbl" style="left:580px;top:356px;">yes</div>
  </div>
  <div class="ft">Build to Launch · buildtolaunch.substack.com</div>
</div>
</body></html>
