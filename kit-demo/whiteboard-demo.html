<!DOCTYPE html>
<!-- /btl-canva-kit demo: whiteboard surface + handwritten fonts + a doodle-arrow element. -->
<html lang="en"><head><meta charset="utf-8"><title>Whiteboard demo</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1350px;overflow:hidden;background:#FCFCFA;}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
.wrap{position:relative;z-index:2;padding:104px 96px;}
.eyebrow{font-family:'Patrick Hand',cursive;font-size:42px;letter-spacing:3px;color:#8B5CF6;}
.title{font-family:'Caveat',cursive;font-weight:700;font-size:124px;line-height:1.0;margin:6px 0 14px;color:#6B2FD0;}
.swoosh{margin-bottom:48px;}
.line{font-family:'Patrick Hand',cursive;font-size:60px;line-height:1.6;color:#1F2937;}
.num{color:#8B5CF6;font-weight:700;}
.note{position:absolute;z-index:2;font-family:'Caveat',cursive;font-weight:700;font-size:62px;color:#6B2FD0;}
.arrow{position:absolute;z-index:2;}
.spark{position:absolute;z-index:2;}
.ft{position:absolute;left:96px;bottom:70px;z-index:2;font-family:'Patrick Hand',cursive;font-size:36px;color:#9CA3AF;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Whiteboard demo">
  <img class="bg" src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/surfaces/surface_whiteboard.png" alt="whiteboard">
  <div class="wrap">
    <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
    <div class="title">Free Canva = 3 moves</div>
    <svg class="swoosh" width="600" height="18" viewBox="0 0 600 18"><path d="M6 12 C160 2 360 18 594 6" fill="none" stroke="#C4A9F2" stroke-width="8" stroke-linecap="round"/></svg>
    <div class="line"><span class="num">1.</span> write HTML in your brand</div>
    <div class="line"><span class="num">2.</span> import → editable Canva</div>
    <div class="line"><span class="num">3.</span> export the PNG</div>
  </div>
  <!-- elements library: doodle arrow + sparkle + handwritten stamp -->
  <svg class="spark" style="left:735px;top:560px;" width="70" height="70" viewBox="0 0 60 60"><path d="M30 4 C33 22 38 27 56 30 C38 33 33 38 30 56 C27 38 22 33 4 30 C22 27 27 22 30 4 Z" fill="#8B5CF6"/></svg>
  <svg class="arrow" style="left:600px;top:980px;" width="220" height="150" viewBox="0 0 120 70"><path d="M8 12 C44 4 80 30 104 64" fill="none" stroke="#6B2FD0" stroke-width="5" stroke-linecap="round"/><path d="M90 52 L108 66 L92 78 Z" fill="#6B2FD0"/></svg>
  <div class="note" style="left:560px;top:1120px;">no Pro needed!</div>
  <div class="ft">buildtolaunch.substack.com</div>
</div>
</body></html>
