<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>Where a free Canva plan walls off</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--accent:#6B2FD0;--secondary:#8B5CF6;--lav:#F0EBFF;--lav2:#E9DBFF;--canvas:#F9F9F5;--card:#FFFFFF;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--sep:#E5E7EB;--dot:#D9CCF5;--tex:#E7DEFA;
    --elev:0 0 0 1px #ECE7F5, 0 26px 50px -16px rgba(107,47,208,.22);}
  *{box-sizing:border-box;margin:0;}
  body{font-family:'Nunito',sans-serif;}
  .page{position:relative;background:var(--canvas);overflow:hidden;}
  .tex{position:absolute;inset:0;background-image:radial-gradient(var(--tex) 2.5px,transparent 2.6px);background-size:46px 46px;opacity:.5;z-index:0;}
  .eyebrow{display:flex;align-items:center;gap:14px;font-size:30px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
  .edot{width:18px;height:18px;border-radius:50%;background:var(--accent);display:inline-block;}
  .hl{background:var(--lav2);color:var(--accent);border-radius:12px;padding:2px 14px;white-space:nowrap;-webkit-box-decoration-break:clone;box-decoration-break:clone;}
  .ft{position:absolute;bottom:54px;font-family:'Barlow Semi Condensed',sans-serif;font-size:28px;font-weight:600;color:#9CA3AF;z-index:2;}
</style></head><body>
<style>
  .cg{width:1080px;height:1350px;padding:84px 72px;display:flex;flex-direction:column;}
  .cg .eyebrow{margin-bottom:10px;}
  .cg-title{font-size:62px;font-weight:900;color:var(--ink);line-height:1.04;margin-bottom:40px;z-index:1;}
  .cg-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px;z-index:1;}
  .cg-tile{background:var(--card);border-radius:24px;box-shadow:var(--elev);overflow:hidden;margin:0;}
  .cg-tile img{display:block;width:100%;height:auto;border-bottom:1px solid var(--sep);}
  .cg-tile figcaption{font-family:'Barlow Semi Condensed',sans-serif;font-size:28px;font-weight:600;color:var(--body);padding:18px 24px;}
  .cg .ft{left:72px;}
</style>
<div class="page cg" data-document-role="page" data-label="Where a free Canva plan walls off">
  <div class="tex"></div>
  <div class="eyebrow"><span class="edot"></span>Build to Launch</div>
  <div class="cg-title">Where a free Canva plan <span class="hl">walls off</span></div>
  <div class="cg-grid">
    <figure class="cg-tile">
      <img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/walls/wall_magic-design-limit.png" alt="Magic Design — monthly AI limit">
      <figcaption>Magic Design — monthly AI limit</figcaption>
    </figure>
    <figure class="cg-tile">
      <img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/walls/wall_resize.png" alt="Resize — Pro only">
      <figcaption>Resize — Pro only</figcaption>
    </figure>
    <figure class="cg-tile">
      <img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/walls/wall_brand-kit.png" alt="Brand Templates — paid">
      <figcaption>Brand Templates — paid</figcaption>
    </figure>
    <figure class="cg-tile">
      <img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/walls/wall_watermark.png" alt="Premium elements — watermarked">
      <figcaption>Premium elements — watermarked</figcaption>
    </figure></div>
  <div class="ft">Build to Launch · buildtolaunch.substack.com</div>
</div></body></html>
