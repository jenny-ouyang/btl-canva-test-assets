<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>BG Muted Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#6B2FD0;--ink:#1F2937;}
  *{box-sizing:border-box;margin:0;}
  body{font-family:'Nunito',sans-serif;display:inline-block;}
  .page{position:relative;width:1080px;height:1080px;overflow:hidden;background:var(--ink);}
  .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0;}
  /* muted overlay: darken + tint toward ink/purple so any text reads */
  .overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg, rgba(31,41,55,.72) 0%, rgba(31,41,55,.62) 50%, rgba(43,28,74,.78) 100%);}
  .content{position:absolute;inset:0;padding:110px 100px;display:flex;flex-direction:column;z-index:2;}
  .eyebrow{font-size:30px;font-weight:800;color:#C9B6F5;letter-spacing:2px;text-transform:uppercase;}
  .q{margin-top:auto;font-size:92px;font-weight:900;color:#F8F6FF;line-height:1.1;}
  .q .hl{background:var(--accent);color:#fff;border-radius:14px;padding:2px 18px;white-space:nowrap;-webkit-box-decoration-break:clone;box-decoration-break:clone;}
  .ft{margin-top:auto;font-family:'Barlow Semi Condensed',sans-serif;font-size:30px;font-weight:600;color:#A7A2B3;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="BG muted overlay">
  <img class="bg" src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/bg-source_workspace.png" alt="workspace">
  <div class="overlay"></div>
  <div class="content">
    <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
    <div class="q">Most people stall on the <span class="hl">setup</span>, not the tool.</div>
    <div class="ft">buildtolaunch.substack.com</div>
  </div>
</div>
</body></html>
