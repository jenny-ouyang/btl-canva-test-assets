<!DOCTYPE html>
<!-- Collage of 7 slides, 4 top / 3 bottom, on 1588x1123. The rounded corners + grey border are BAKED INTO each PNG (alpha) — not a CSS frame — so the imported Canva image elements are genuinely rounded + editable. No CSS radius/border here on purpose. -->
<html lang="en"><head><meta charset="utf-8"><title>Carousel collage (rounded images)</title>
<style>
  *{box-sizing:border-box;margin:0;}
  .page{position:relative;width:1588px;height:1123px;background:#FFFFFF;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;padding:6px 24px;}
  .row{display:flex;gap:14px;justify-content:center;}
  .tile{width:384px;height:480px;}
  .tile img{display:block;width:100%;height:100%;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Carousel collage rounded">
  <div class="row r1">
    <div class="tile"><img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/cv1r/slide_1r.png" alt="1"></div>
    <div class="tile"><img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/cv1r/slide_2r.png" alt="2"></div>
    <div class="tile"><img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/cv1r/slide_3r.png" alt="3"></div>
    <div class="tile"><img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/cv1r/slide_4r.png" alt="4"></div>
  </div>
  <div class="row r2">
    <div class="tile"><img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/cv1r/slide_5r.png" alt="5"></div>
    <div class="tile"><img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/cv1r/slide_6r.png" alt="6"></div>
    <div class="tile"><img src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/cv1r/slide_7r.png" alt="7"></div>
  </div>
</div>
</body></html>
