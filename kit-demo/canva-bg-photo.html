<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>BG Photo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#6B2FD0;--lav2:#E9DBFF;--canvas:#F9F9F5;--ink:#1F2937;--muted:#6B7280;}
  *{box-sizing:border-box;margin:0;}
  body{font-family:'Nunito',sans-serif;display:inline-block;}
  .page{position:relative;width:1080px;height:1080px;overflow:hidden;background:var(--canvas);}
  .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:left center;z-index:0;}
  .scrim{position:absolute;inset:0;background:linear-gradient(90deg, rgba(249,249,245,.95) 0%, rgba(249,249,245,.80) 34%, rgba(249,249,245,.20) 62%, transparent 78%);z-index:1;}
  .content{position:absolute;inset:0;padding:110px 100px;display:flex;flex-direction:column;z-index:2;}
  .eyebrow{font-size:30px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
  .h{font-size:86px;font-weight:900;color:var(--ink);line-height:1.06;margin-top:auto;max-width:620px;}
  .h .hl{background:var(--lav2);color:var(--accent);border-radius:12px;padding:2px 14px;white-space:nowrap;-webkit-box-decoration-break:clone;box-decoration-break:clone;}
  .sub{font-family:'Barlow Semi Condensed',sans-serif;font-size:38px;font-weight:500;color:var(--muted);margin-top:24px;max-width:560px;}
  .ft{margin-top:auto;font-family:'Barlow Semi Condensed',sans-serif;font-size:30px;font-weight:600;color:#9CA3AF;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="BG photo">
  <img class="bg" src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/bg-source_workspace.png" alt="workspace">
  <div class="scrim"></div>
  <div class="content">
    <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
    <div class="h">Onboard to Claude in <span class="hl">20 minutes</span></div>
    <div class="sub">No learning curve. The right 20-minute setup.</div>
    <div class="ft">buildtolaunch.substack.com</div>
  </div>
</div>
</body></html>
