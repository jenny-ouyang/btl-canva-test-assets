<!DOCTYPE html>
<!-- btl-canva-kit surface · whiteboard (1080×1350). Surface IMAGE + aluminum FRAME (border element, survives import) + handwritten fonts (Caveat + Kalam). -->
<html lang="en"><head><meta charset="utf-8"><title>Whiteboard</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1350px;overflow:hidden;background:#FCFCFA;}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
/* aluminum frame = a real border element (survives import); inset from edges, rounded, with metal sheen */
.frame{position:absolute;inset:30px;border:22px solid #C7CBD2;border-radius:28px;box-shadow:0 12px 30px rgba(0,0,0,.12),inset 0 3px 6px rgba(255,255,255,.7),inset 0 -4px 8px rgba(0,0,0,.10);z-index:1;}
.wrap{position:relative;z-index:2;padding:128px 110px;}
.eyebrow{font-family:'Kalam',cursive;font-weight:700;font-size:40px;letter-spacing:2px;color:#8B5CF6;}
.title{font-family:'Caveat',cursive;font-weight:700;font-size:128px;line-height:1.0;margin:4px 0 14px;color:#6B2FD0;}
.swoosh{margin-bottom:46px;}
.line{font-family:'Kalam',cursive;font-weight:400;font-size:58px;line-height:1.55;color:#1F2937;}
.num{font-family:'Caveat',cursive;font-weight:700;color:#8B5CF6;font-size:64px;}
.ft{position:absolute;left:110px;bottom:96px;z-index:2;font-family:'Kalam',cursive;font-size:32px;color:#9CA3AF;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Whiteboard">
  <img class="bg" src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/surfaces/surface_whiteboard.png" alt="whiteboard">
  <div class="frame"></div>
  <div class="wrap">
    <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
    <div class="title">The weekend build plan</div>
    <svg class="swoosh" width="540" height="18" viewBox="0 0 540 18"><path d="M6 12 C140 2 320 18 534 6" fill="none" stroke="#C4A9F2" stroke-width="8" stroke-linecap="round"/></svg>
    <div class="line"><span class="num">1.</span> idea → smallest version</div>
    <div class="line"><span class="num">2.</span> build the ugly draft</div>
    <div class="line"><span class="num">3.</span> ship Saturday</div>
    <div class="line"><span class="num">4.</span> share Sunday</div>
  </div>
  <div class="ft">buildtolaunch.substack.com</div>
</div>
</body></html>
