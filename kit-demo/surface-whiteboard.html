<!DOCTYPE html>
<!-- btl-canva-kit surface · whiteboard (1080×1350). Real surface IMAGE + handwritten marker text (purple + ink). -->
<html lang="en"><head><meta charset="utf-8"><title>Whiteboard</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1350px;overflow:hidden;background:#FCFCFA;}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
.wrap{position:relative;z-index:2;padding:104px 96px;}
.eyebrow{font-family:'Patrick Hand',cursive;font-size:42px;letter-spacing:3px;color:#8B5CF6;}
.title{font-family:'Caveat',cursive;font-weight:700;font-size:128px;line-height:1.0;margin:6px 0 16px;color:#6B2FD0;}
.swoosh{width:560px;height:18px;margin-bottom:40px;}
.line{font-family:'Patrick Hand',cursive;font-size:58px;line-height:1.55;color:#1F2937;}
.num{color:#8B5CF6;font-weight:700;}
.ft{position:absolute;left:96px;bottom:70px;z-index:2;font-family:'Patrick Hand',cursive;font-size:36px;color:#9CA3AF;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Whiteboard">
  <img class="bg" src="https://raw.githubusercontent.com/jenny-ouyang/btl-canva-test-assets/main/kit-demo/surfaces/surface_whiteboard.png" alt="whiteboard">
  <div class="wrap">
    <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
    <div class="title">The weekend build plan</div>
    <svg class="swoosh" width="560" height="18" viewBox="0 0 560 18"><path d="M6 12 C140 2 320 18 554 6" fill="none" stroke="#C4A9F2" stroke-width="8" stroke-linecap="round"/></svg>
    <div class="line"><span class="num">1.</span> idea → smallest version</div>
    <div class="line"><span class="num">2.</span> build the ugly draft</div>
    <div class="line"><span class="num">3.</span> ship Saturday</div>
    <div class="line"><span class="num">4.</span> share Sunday</div>
  </div>
  <div class="ft">buildtolaunch.substack.com</div>
</div>
</body></html>
