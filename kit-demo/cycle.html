<!DOCTYPE html>
<!-- btl-canva-kit TEMPLATE · cycle / flywheel (1080×1080) — 4 nodes in a loop + curved SVG arrows (path+marker; SVG proven).
     Swap zones: 1) BRAND TOKENS  2) CONTENT (title/sub, 4 node labels, center label). -->
<html lang="en"><head><meta charset="utf-8"><title>Cycle</title>
<!-- SWAP(fonts) -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* >>> BRAND TOKENS >>> */
:root{--accent:#6B2FD0;--secondary:#8B5CF6;--third:#C4A9F2;--canvas:#F9F9F5;--card:#FFFFFF;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--lav:#F0EBFF;--lav2:#E9DBFF;--sep:#E5E7EB;--tex:#E7DEFA;--headerFont:'Nunito';--bodyFont:'Barlow Semi Condensed';}
/* <<< END BRAND TOKENS <<< */
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1080px;background:var(--canvas);overflow:hidden;padding:70px;font-family:var(--headerFont),sans-serif;}
.tex{position:absolute;inset:0;background-image:radial-gradient(var(--tex) 2.5px,transparent 2.6px);background-size:46px 46px;opacity:.45;z-index:0;}
.eyebrow{position:relative;z-index:1;font-size:26px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.title{position:relative;z-index:1;font-size:60px;font-weight:900;color:var(--ink);line-height:1.04;margin:8px 0 6px;}
.sub{position:relative;z-index:1;font-family:var(--bodyFont),sans-serif;font-size:30px;color:var(--muted);margin-bottom:10px;}
.cyc{position:relative;z-index:1;width:760px;height:660px;margin:16px auto 0;}
.cnode{position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;background:#fff;border-radius:16px;box-shadow:0 0 0 1px #ECE7F5,0 16px 32px -14px rgba(107,47,208,.25);font-size:32px;font-weight:800;color:var(--ink);}
.ccenter{position:absolute;left:280px;top:296px;width:200px;text-align:center;font-size:32px;font-weight:900;color:var(--accent);}
.ft{position:absolute;left:70px;bottom:46px;font-family:var(--bodyFont),sans-serif;font-size:26px;font-weight:600;color:#9CA3AF;z-index:2;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Cycle">
  <div class="tex"></div>
  <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
  <!-- SWAP(title/sub) -->
  <div class="title">The build-in-public flywheel</div>
  <div class="sub">Each turn compounds</div>
  <div class="cyc">
    <svg width="760" height="660" viewBox="0 0 760 660" style="position:absolute;inset:0;">
      <defs><marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#8B5CF6"/></marker></defs>
      <path d="M505 114 A250 250 0 0 1 615 245" fill="none" stroke="#8B5CF6" stroke-width="4" marker-end="url(#ah)"/>
      <path d="M615 415 A250 250 0 0 1 505 546" fill="none" stroke="#8B5CF6" stroke-width="4" marker-end="url(#ah)"/>
      <path d="M255 546 A250 250 0 0 1 145 415" fill="none" stroke="#8B5CF6" stroke-width="4" marker-end="url(#ah)"/>
      <path d="M145 245 A250 250 0 0 1 255 114" fill="none" stroke="#8B5CF6" stroke-width="4" marker-end="url(#ah)"/>
    </svg>
    <!-- >>> REPEAT:node — 4 chips clockwise from top: top/right/bottom/left >>> -->
    <div class="cnode" style="left:270px;top:4px;width:220px;height:84px;">Build</div>
    <div class="cnode" style="left:522px;top:288px;width:220px;height:84px;">Share</div>
    <div class="cnode" style="left:270px;top:572px;width:220px;height:84px;">Get feedback</div>
    <div class="cnode" style="left:18px;top:288px;width:220px;height:84px;">Improve</div>
    <!-- <<< /REPEAT:node -->
    <div class="ccenter">Compounds</div>
  </div>
  <div class="ft">Build to Launch · buildtolaunch.substack.com</div>
</div>
</body></html>
