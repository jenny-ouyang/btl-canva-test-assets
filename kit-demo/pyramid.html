<!DOCTYPE html>
<!-- btl-canva-kit TEMPLATE · pyramid / ladder (1080×1080) — stacked decreasing-width rects (proven).
     Swap zones: 1) BRAND TOKENS  2) CONTENT (title/sub + REPEAT:rung). -->
<html lang="en"><head><meta charset="utf-8"><title>Pyramid</title>
<!-- SWAP(fonts) -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* >>> BRAND TOKENS >>> */
:root{--accent:#6B2FD0;--secondary:#8B5CF6;--third:#C4A9F2;--canvas:#F9F9F5;--card:#FFFFFF;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--lav:#F0EBFF;--lav2:#E9DBFF;--sep:#E5E7EB;--tex:#E7DEFA;--headerFont:'Nunito';--bodyFont:'Barlow Semi Condensed';}
/* <<< END BRAND TOKENS <<< */
*{box-sizing:border-box;margin:0;}
.page{position:relative;width:1080px;height:1080px;background:var(--canvas);overflow:hidden;padding:70px;font-family:var(--headerFont),sans-serif;}
.tex{position:absolute;inset:0;background-image:radial-gradient(var(--tex) 2.5px,transparent 2.6px);background-size:46px 46px;opacity:.45;z-index:0;}
.eyebrow{position:relative;z-index:1;font-size:26px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.title{position:relative;z-index:1;font-size:60px;font-weight:900;color:var(--ink);line-height:1.04;margin:8px 0 6px;}
.sub{position:relative;z-index:1;font-family:var(--bodyFont),sans-serif;font-size:30px;color:var(--muted);margin-bottom:30px;}
.pyr{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:20px;}
.rung{height:104px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:38px;font-weight:800;border-radius:14px;box-shadow:0 12px 26px -12px rgba(107,47,208,.35);}
.ft{position:absolute;left:70px;bottom:46px;font-family:var(--bodyFont),sans-serif;font-size:26px;font-weight:600;color:#9CA3AF;z-index:2;}
</style></head>
<body>
<div class="page" data-document-role="page" data-label="Pyramid ladder">
  <div class="tex"></div>
  <div class="eyebrow">●&nbsp;&nbsp;Build to Launch</div>
  <!-- SWAP(title/sub) -->
  <div class="title">The AI-builder ladder</div>
  <div class="sub">From chatting with AI to shipping systems</div>
  <!-- >>> REPEAT:rung — top (narrowest, darkest) to bottom (widest, lightest). Set width + bg per rung. >>> -->
  <div class="pyr">
    <div class="rung" style="width:300px;background:#4C1D95;">Ship a system</div>
    <div class="rung" style="width:430px;background:#6B2FD0;">Run an agent</div>
    <div class="rung" style="width:560px;background:#8B5CF6;">Build a workflow</div>
    <div class="rung" style="width:690px;background:#A98BF0;">Prompt with intent</div>
    <div class="rung" style="width:820px;background:#C4A9F2;color:#3B2566;">Chat with AI</div>
  </div>
  <!-- <<< /REPEAT:rung -->
  <div class="ft">Build to Launch · buildtolaunch.substack.com</div>
</div>
</body></html>
