<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Onboard to Claude — Hero Metric</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--accent:#6B2FD0;--secondary:#8B5CF6;--lav:#F0EBFF;--canvas:#F9F9F5;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--sep:#E5E7EB;}
  *{box-sizing:border-box;margin:0;}
  body{font-family:'Nunito',sans-serif;display:inline-block;}
  .page{position:relative;width:1080px;height:1080px;background:var(--canvas);overflow:hidden;}
  .blob{position:absolute;width:520px;height:520px;border-radius:50%;background:var(--lav);right:-180px;top:-200px;}
  .content{position:absolute;inset:0;padding:96px 100px;display:flex;flex-direction:column;z-index:1;}
  .eyebrow{font-size:30px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
  .rule{width:96px;height:6px;border-radius:3px;background:var(--accent);margin-top:18px;}
  .hero{margin-top:auto;margin-bottom:auto;}
  .kicker{font-family:'Barlow Semi Condensed',sans-serif;font-size:48px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .num{font-size:340px;font-weight:900;color:var(--accent);line-height:.92;letter-spacing:-6px;}
  .unit{font-size:128px;font-weight:900;color:var(--ink);line-height:1;margin-top:-8px;}
  .contrast{font-size:52px;font-weight:700;color:var(--body);margin-top:40px;}
  .contrast s{color:var(--muted);text-decoration-thickness:5px;}
  .callout{border-left:6px solid var(--accent);padding:6px 22px;margin-top:46px;font-family:'Barlow Semi Condensed',sans-serif;font-style:italic;font-weight:600;font-size:40px;color:var(--body);}
  .footer{border-top:1px solid var(--sep);padding-top:26px;font-family:'Barlow Semi Condensed',sans-serif;font-size:30px;font-weight:600;color:#9CA3AF;}
</style>
</head>
<body>
<div class="page" data-document-role="page" data-label="Hero Metric">
  <div class="blob"></div>
  <div class="content">
    <div><div class="eyebrow">Build to Launch</div><div class="rule"></div></div>
    <div class="hero">
      <div class="kicker">Onboard to Claude in</div>
      <div class="num">20</div>
      <div class="unit">minutes</div>
      <div class="contrast">Not <s>20 days</s>. The whole curve is the setup.</div>
    </div>
    <div class="callout">Most people stall on the setup, not the tool.</div>
    <div class="footer">buildtolaunch.substack.com</div>
  </div>
</div>
</body>
</html>
