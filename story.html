<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Onboard to Claude — Story 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#6B2FD0;--secondary:#8B5CF6;--canvas:#F9F9F5;--card:#FFFFFF;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;--sep:#E5E7EB;}
  *{box-sizing:border-box;margin:0;}
  body{font-family:'Nunito',sans-serif;display:inline-block;}
  .page{position:relative;width:1080px;height:1920px;background:var(--canvas);overflow:hidden;}
  .accent{position:absolute;top:0;left:0;width:1080px;height:20px;background:var(--accent);}
  .content{position:absolute;inset:0;padding:150px 90px;}
  .eyebrow{font-size:30px;font-weight:800;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:30px;}
  .hook{font-size:96px;font-weight:900;color:var(--ink);line-height:1.04;margin-bottom:70px;}
  .hook .hl{color:var(--accent);}
  .step{display:flex;align-items:center;gap:26px;background:var(--card);border-radius:18px;padding:26px 30px;margin-bottom:22px;box-shadow:0 0 0 1px var(--sep);}
  .badge{flex:0 0 auto;width:72px;height:72px;border-radius:50%;background:var(--accent);color:#fff;font-size:42px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .step:nth-child(even) .badge{background:var(--secondary);}
  .label{font-size:46px;font-weight:800;color:var(--ink);margin:0;}
  .cta{position:absolute;left:90px;bottom:140px;font-family:'Barlow Semi Condensed',sans-serif;font-size:40px;font-weight:600;color:var(--accent);}
</style>
</head>
<body>
<div class="page" data-document-role="page" data-label="Onboard to Claude Story">
  <div class="accent"></div>
  <div class="content">
    <div class="eyebrow">Build to Launch</div>
    <div class="hook">Onboard to Claude in <span class="hl">20 minutes</span>, not 20 days.</div>
    <div class="step"><div class="badge">1</div><p class="label">Set up Claude Desktop</p></div>
    <div class="step"><div class="badge">2</div><p class="label">Get Claude to know you</p></div>
    <div class="step"><div class="badge">3</div><p class="label">Install the right plugin</p></div>
  </div>
  <div class="cta">Full 5-step setup at buildtolaunch.ai</div>
</div>
</body>
</html>
