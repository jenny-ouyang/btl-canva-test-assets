<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Onboard to Claude — YouTube Thumbnail</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#6B2FD0;--secondary:#8B5CF6;--lav:#F0EBFF;--lav2:#E9DBFF;--canvas:#F9F9F5;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;}
  *{box-sizing:border-box;margin:0;}
  body{font-family:'Nunito',sans-serif;display:inline-block;}
  .page{position:relative;width:1280px;height:720px;background:var(--canvas);overflow:hidden;}
  .tex{position:absolute;inset:0;background-image:radial-gradient(#E7DEFA 2.5px,transparent 2.6px);background-size:48px 48px;opacity:.45;z-index:0;}
  .accent{position:absolute;top:0;left:0;width:1280px;height:18px;background:var(--accent);z-index:2;}
  .dot{position:absolute;right:-120px;top:-120px;width:440px;height:440px;border-radius:50%;background:#F0EBFF;z-index:0;}
  .content{position:absolute;inset:0;padding:90px;display:flex;flex-direction:column;justify-content:center;z-index:1;}
  .eyebrow{display:flex;align-items:center;gap:14px;font-size:34px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;}
  .edot{width:20px;height:20px;border-radius:50%;background:var(--accent);display:inline-block;}
  .hook{font-size:118px;font-weight:900;color:var(--ink);line-height:1.02;margin:0 0 26px;}
  .hook .hl{background:var(--lav2);color:var(--accent);border-radius:16px;padding:2px 20px;white-space:nowrap;-webkit-box-decoration-break:clone;box-decoration-break:clone;}
  .sub{font-family:'Barlow Semi Condensed',sans-serif;font-size:40px;font-weight:500;color:var(--body);}
</style>
</head>
<body>
<div class="page" data-document-role="page" data-label="Onboard to Claude Thumbnail">
  <div class="tex"></div>
  <div class="accent"></div>
  <div class="dot"></div>
  <div class="content">
    <div class="eyebrow"><span class="edot"></span>Build to Launch</div>
    <div class="hook">Onboard to Claude<br>in <span class="hl">20 Minutes</span></div>
    <div class="sub">No learning curve. The 5-step setup.</div>
  </div>
</div>
</body>
</html>
