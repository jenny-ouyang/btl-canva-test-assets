<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Onboard to Claude — YouTube Thumbnail</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#6B2FD0;--secondary:#8B5CF6;--canvas:#F9F9F5;--ink:#1F2937;--body:#4B5563;--muted:#6B7280;}
  *{box-sizing:border-box;margin:0;}
  body{font-family:'Nunito',sans-serif;display:inline-block;}
  .page{position:relative;width:1280px;height:720px;background:var(--canvas);overflow:hidden;}
  .accent{position:absolute;top:0;left:0;width:1280px;height:18px;background:var(--accent);}
  .dot{position:absolute;right:-120px;top:-120px;width:420px;height:420px;border-radius:50%;background:#F0EBFF;}
  .content{position:absolute;inset:0;padding:90px;display:flex;flex-direction:column;justify-content:center;}
  .eyebrow{font-size:34px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;}
  .hook{font-size:118px;font-weight:900;color:var(--ink);line-height:1.0;margin:0 0 24px;}
  .hook .hl{color:var(--accent);}
  .sub{font-family:'Barlow Semi Condensed',sans-serif;font-size:40px;font-weight:500;color:var(--body);}
</style>
</head>
<body>
<div class="page" data-document-role="page" data-label="Onboard to Claude Thumbnail">
  <div class="accent"></div>
  <div class="dot"></div>
  <div class="content">
    <div class="eyebrow">Build to Launch</div>
    <div class="hook">Onboard to Claude<br>in <span class="hl">20 Minutes</span></div>
    <div class="sub">No learning curve. The 5-step setup.</div>
  </div>
</div>
</body>
</html>
